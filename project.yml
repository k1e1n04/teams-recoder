name: TeamsAutoRecorder
options:
  deploymentTarget:
    macOS: '13.0'
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.k1e1n04.TeamsAutoRecorder
    SWIFT_VERSION: 6.0
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.12.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.0
targets:
  TeamsAutoRecorder:
    type: application
    platform: macOS
    sources:
      - Sources/TeamsAutoRecorder
    dependencies:
      - package: WhisperKit
      - package: ZIPFoundation
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: TeamsAutoRecorder
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 会議の音声を録音するためにマイクへのアクセスが必要です。
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: 13.0
schemes:
  TeamsAutoRecorder:
    build:
      targets:
        TeamsAutoRecorder: all
